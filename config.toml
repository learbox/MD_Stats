# ==========================================================
# MD Stats 配置文件（由设置 GUI 生成）
# ==========================================================

[detection]
interval = 0.3
confidence_threshold = 0.8

[window]
width = 1300
height = 700

[appearance]
theme = "macaron"

[opponent_decks]
presets = ["炎兽", "闪刀姬", "烙印", "白银城"]

[recorder]
daily_files = false

[clipboard]
vertical_layout = true
scope = "all"
columns = ["卡组", "对局数", "胜/负", "赢/输硬币", "赢硬币概率", "赢硬币胜率", "输硬币胜率", "综合胜率"]

[floating_window]
use_theme_bg = false
width = 250
height = 300
bg_color = "#bdef0a"
opacity = 50
font_size = 20
text_color = "#000000"
font_family = "Microsoft YaHei"
rows = ["卡组", "对局数", "胜/负", "赢/输硬币", "赢硬币概率", "赢硬币胜率", "输硬币胜率", "综合胜率"]
