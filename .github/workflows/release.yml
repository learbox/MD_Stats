name: Release

on:
  push:
    tags:
      - 'v*.*.*'          # 推送 v1.4.0 这类 tag 时触发
  workflow_dispatch:       # 允许手动触发

permissions:
  contents: write          # 允许创建 Release

jobs:
  build:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 uv（含 Python 3.11）
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: 同步依赖（按 uv.lock 精确复现）
        run: uv sync --frozen

      - name: 编译 .ui 文件
        run: uv run pyside6-uic ui/main_window.ui -o ui/main_window_ui.py

      - name: PyInstaller 打包（内联 spec，自动排除未用 Qt 模块和多语翻译）
        shell: pwsh
        run: |
          @'
          # -*- mode: python ; coding: utf-8 -*-

          _UNUSED_QT_DLLS = [
              'qt6quick', 'qt6qml', 'qt6pdf', 'qt6svg',
              'qt6virtualkeyboard', 'qt6network',
              'qt63d', 'qt6opengl', 'opengl32sw',
              'qt6webchannel', 'qt6webengine', 'qt6websockets',
              'qt6bluetooth', 'qt6nfc', 'qt6serialport',
              'qt6multimedia', 'qt6sensors', 'qt6positioning',
              'qt6printsupport', 'qt6help', 'qt6sql', 'qt6test',
              'qt6concurrent', 'qt6dbus',
              'qt6xml', 'qt6designer', 'qt6axcontainer',
          ]

          a = Analysis(
              ['main.py'],
              pathex=[],
              binaries=[],
              datas=[],
              hiddenimports=[],
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[],
              noarchive=False,
              optimize=0,
          )
          a.binaries = [
              (name, path, typ) for name, path, typ in a.binaries
              if not any(kw in name.lower() for kw in _UNUSED_QT_DLLS)
              and not ('translations' in path.lower() and 'qt_zh_cn' not in name.lower())
          ]
          pyz = PYZ(a.pure)

          exe = EXE(
              pyz,
              a.scripts,
              [],
              exclude_binaries=True,
              name='MDStats',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=False,
              console=False,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
              icon=['app_icon.ico'],
              contents_directory='.runtime',
          )
          coll = COLLECT(
              exe,
              a.binaries,
              a.datas,
              strip=False,
              upx=False,
              upx_exclude=[],
              name='MDStats',
          )

          import os as _os, glob as _glob
          _tr_dir = 'dist/MDStats/.runtime/PySide6/translations'
          if _os.path.isdir(_tr_dir):
              for _f in _glob.glob(f'{_tr_dir}/qt*.qm'):
                  if 'zh_cn' not in _os.path.basename(_f).lower():
                      _os.remove(_f)
          '@ | Set-Content MDStats.spec -Encoding UTF8

          uv run --with 'pyinstaller>=6.10,<7' pyinstaller MDStats.spec --noconfirm

      - name: 组装发布目录
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $tag = $env:TAG
          $release = "dist/release"
          New-Item -ItemType Directory -Path $release -Force | Out-Null
          Copy-Item "dist/MDStats/MDStats.exe" $release
          Copy-Item -Recurse "dist/MDStats/.runtime" $release
          Copy-Item -Recurse themes $release
          Copy-Item -Recurse csv $release
          Copy-Item -Recurse resource $release
          Copy-Item config.toml $release
          Copy-Item .app_state.json $release
          Copy-Item docs/README_release.md "$release/README.md"
          Get-ChildItem -Path $release -Recurse -Include __pycache__ -Force | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $release -Recurse -Filter *.pyc -Force | Remove-Item -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path "$release/*" -DestinationPath "dist/MDStats-$tag.zip" -CompressionLevel Optimal

      - name: 上传 ZIP 为构建产物（非 tag 时在此下载）
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: MDStats-${{ github.ref_name }}
          path: dist/MDStats-${{ github.ref_name }}.zip

      - name: 创建 GitHub Release（草稿，仅 tag 触发）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MDStats-${{ github.ref_name }}.zip
          name: MD Stats ${{ github.ref_name }}
          draft: true
